name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/

      - name: Type-check (mypy)
        run: mypy app/ --ignore-missing-imports --no-strict-optional --follow-imports=skip

      - name: Run pytest with coverage
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=50

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + axe dependencies
        run: |
          npm install --prefix tests playwright @playwright/test @axe-core/playwright
          npx --prefix tests playwright install chromium --with-deps

      - name: Run accessibility scan (Playwright + axe-core)
        run: node tests/axe_scan.js
