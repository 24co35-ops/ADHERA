<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Adhera</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicons/logo.svg?v=3">
    <link rel="shortcut icon" href="/assets/favicons/favicon.ico?v=3" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png?v=3">
    <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicons/favicon-48x48.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/favicon-180x180.png?v=3">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#111318">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background: #111318; color: #e2e2e8; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px; }
        input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.12) !important; color: #e2e2e8 !important; border-radius: 12px !important; }
        input:focus { outline: none !important; border-color: #00dbe7 !important; }
        button.bg-cyan-600 { background: #00dbe7 !important; color: #002022 !important; border-radius: 12px !important; }
        button.bg-cyan-600:hover { background: #00c4cf !important; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div x-data="forgotPassword()" class="glass p-8 shadow-2xl w-full max-w-md">
        <div class="flex justify-center w-full mb-4" style="height: 60px;">
            <div style="transform: scale(0.3); transform-origin: center;">
                <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00F2FF" />
                            <stop offset="100%" stop-color="#3B82F6" />
                        </linearGradient>
                    </defs>
                    <circle cx="100" cy="100" r="80" fill="url(#glow)" fill-opacity="0.1" stroke="url(#glow)" stroke-width="2" />
                    <circle cx="100" cy="100" r="60" fill="white" fill-opacity="0.05" style="backdrop-filter: blur(10px)" stroke="white" stroke-opacity="0.2" />
                    <path d="M100 60L135 140H115L100 105L85 140H65L100 60Z" fill="url(#glow)" />
                    <rect x="92" y="110" width="16" height="4" rx="2" fill="white" fill-opacity="0.8" />
                </svg>
            </div>
        </div>
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white">Forgot Password</h1>
            <p class="text-slate-400 mt-2 text-sm">Enter your email and we will send you a reset link</p>
        </div>
        <div x-show="!sent">
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-300 mb-1">Email Address</label>
                <input x-model="email" type="email" placeholder="your@email.com"
                    class="w-full px-3 py-2 text-sm focus:outline-none">
            </div>
            <p x-show="error" x-cloak x-text="error" class="text-red-400 text-sm mb-3"></p>
            <button @click="sendReset()" :disabled="loading || !email"
                class="w-full bg-cyan-600 text-white py-2 rounded-lg font-medium disabled:opacity-50 transition-all flex justify-center items-center">
                <svg x-show="loading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-current" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span x-text="loading ? 'Sending...' : 'Send Reset Link'"></span>
            </button>
        </div>
        <div x-show="sent" x-cloak class="text-center">
            <div class="w-16 h-16 bg-emerald-950/50 border border-emerald-500/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h2 class="text-lg font-semibold text-white">Check your inbox</h2>
            <p class="text-slate-400 text-sm mt-2">We sent a password reset link to <strong x-text="email" class="text-slate-200"></strong>. Check your spam folder if you don't see it.</p>
            <button @click="sent = false; email = ''" class="mt-4 text-cyan-400 text-sm hover:underline bg-transparent border-0 cursor-pointer">Try a different email</button>
        </div>
        <div class="text-center mt-6">
            <a href="index.html" class="text-sm text-cyan-400 hover:underline">Back to Login</a>
        </div>
    </div>
    <script>
    const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    function forgotPassword() {
        return {
            email: "",
            loading: false,
            sent: false,
            error: "",
            async sendReset() {
                this.loading = true;
                this.error = "";
                try {
                    const redirectUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                        ? "http://localhost:8080/reset-password.html"
                        : "https://adhera-seven.vercel.app/reset-password.html";
                    const { error } = await supabase.auth.resetPasswordForEmail(this.email, {
                        redirectTo: redirectUrl
                    });
                    if (error) {
                        this.error = error.message;
                        return;
                    }
                    this.sent = true;
                } catch (e) {
                    this.error = "Something went wrong. Please try again.";
                } finally {
                    this.loading = false;
                }
            }
        }
    }
    </script>
</body>
</html>
