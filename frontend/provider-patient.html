<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="patientData()" class="min-h-screen flex flex-col">
    <!-- Nav Header -->
    <nav class="glass p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="text-xl font-bold text-cyan-400">Adhera Provider</div>
        <div class="space-x-4">
            <a href="/provider-dashboard.html" class="hover:text-cyan-400">Back</a>
            <button @click="exportReport" class="bg-cyan-600 hover:bg-cyan-500 px-3 py-1 rounded text-sm text-white">Export</button>
        </div>
    </nav>

    <main class="flex-1 p-6 max-w-5xl mx-auto w-full space-y-6">
        <div class="glass p-6 rounded-xl">
            <h2 class="text-2xl font-bold mb-2" x-text="patient.full_name || 'Loading...'"></h2>
            <div class="text-slate-400 text-sm mb-4" x-text="patient.contact_number"></div>
        </div>
        <div class="glass p-6 rounded-xl">
            <h3 class="text-lg font-bold mb-4">Patient Data Placeholder</h3>
            <p class="text-slate-400">Detailed views for adherence breakdown, medication history, and feedback list go here.</p>
        </div>
    </main>

    <script>
        const config = { SUPABASE_URL: "http://localhost:8000" };
        function patientData() {
            return {
                token: sessionStorage.getItem('jwt'),
                patient: {}, pid: new URLSearchParams(window.location.search).get('id'),
                async init() {
                    if (!this.token || !this.pid) return window.location.href = 'provider-dashboard.html';
                    const payload = JSON.parse(atob(this.token.split('.')[1]));
                    if (payload.role !== 'provider') return window.location.href = 'index.html';
                    await this.fetchPatient();
                },
                async api(path, method = 'GET') {
                    const res = await fetch(`${config.SUPABASE_URL}/v1${path}`, { method, headers: { 'Authorization': `Bearer ${this.token}`, 'Content-Type': 'application/json' } });
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error?.message);
                    return data.data;
                },
                async fetchPatient() { try { this.patient = await this.api(`/provider/patients/${this.pid}`); } catch(e){} },
                async exportReport() { try { const res = await this.api(`/provider/patients/${this.pid}/report`); alert(JSON.stringify(res)); } catch(e){} }
            }
        }
    </script>
</body>
</html>
