<!DOCTYPE html>
<html lang="en">
<head>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicons/logo.svg?v=3">
    <link rel="shortcut icon" href="/assets/favicons/favicon.ico?v=3" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png?v=3">
    <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicons/favicon-48x48.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/favicon-180x180.png?v=3">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#6366f1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhera - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const config = { SUPABASE_URL: CONFIG.API_BASE.replace("/v1", "") };
        function registerData() {
            return {
                form: { full_name: '', email: '', password: '', role: 'patient', date_of_birth: '', contact_number: '', timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC' },
                disclaimer: false, error: null, successMessage: null, loading: false,
                async register() {
                    this.error = null; this.loading = true;
                    try {
                        const payload = { ...this.form };
                        console.log("Register payload:", JSON.stringify(payload));
                        for (const key in payload) {
                            if (payload[key] === null || payload[key] === undefined) {
                                console.warn(`Field ${key} is null/undefined before submission`);
                            }
                        }
                        if (!payload.date_of_birth) delete payload.date_of_birth;
                        const res = await fetch(`${CONFIG.API_BASE}/auth/register`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                        });
                        const data = await res.json();
                        if (!data.success) throw new Error(data.error?.message || "Registration failed");
                        if (data.data?.pending) {
                            this.successMessage = "Registration submitted. An admin will review your account within 24 hours.";
                        } else if (data.data?.email_confirm_required) {
                            this.successMessage = "Check your inbox to confirm your email.";
                        } else {
                            window.location.href = 'index.html?registered=true';
                        }
                    } catch (e) { this.error = e.message; }
                    finally { this.loading = false; }
                }
            }
        }
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background: #111318; color: #e2e2e8; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px; }
        input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.12) !important; color: #e2e2e8 !important; border-radius: 12px !important; }
        input:focus, select:focus, textarea:focus { outline: none !important; border-color: #00dbe7 !important; }
        button[type="submit"], button.bg-cyan-600 { background: #00dbe7 !important; color: #002022 !important; border-radius: 12px !important; }
        button.bg-slate-700 { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.12) !important; border-radius: 12px !important; }
        select option { background-color: #1a1d24 !important; color: #e2e2e8 !important; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" x-data="registerData()">
    <div class="glass p-8 rounded-xl shadow-2xl w-full max-w-lg">
        <h1 class="text-3xl font-bold mb-6  text-center">Register</h1>
        <div x-show="successMessage" x-cloak class="bg-green-900/50 text-green-400 p-4 rounded mb-4" x-text="successMessage"></div>
        <form @submit.prevent="register" class="space-y-4" x-show="!successMessage">
            <div>
                <label class="block text-sm font-medium mb-1">Full Name</label>
                <input type="text" x-model="form.full_name" class="w-full p-2 rounded bg-transparent border border-transparent text-white" required :disabled="loading">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" x-model="form.email" class="w-full p-2 rounded bg-transparent border border-transparent text-white" required :disabled="loading">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" x-model="form.password" class="w-full p-2 rounded bg-transparent border border-transparent text-white" required :disabled="loading">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Role</label>
                    <select x-model="form.role" class="w-full p-2 rounded bg-transparent border border-transparent text-white" required :disabled="loading">
                        <option value="patient">Patient</option>
                        <option value="provider">Healthcare Provider</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Date of Birth</label>
                    <input type="date" x-model="form.date_of_birth" class="w-full p-2 rounded bg-transparent border border-transparent text-white" :disabled="loading">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Contact Number</label>
                    <input type="text" x-model="form.contact_number" class="w-full p-2 rounded bg-transparent border border-transparent text-white" :disabled="loading">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Timezone</label>
                    <select x-model="form.timezone" class="w-full p-2 rounded bg-transparent border border-transparent text-white" required :disabled="loading">
                        <option value="UTC">UTC (UTC+0)</option>
                        <option value="Asia/Kolkata">Asia/Kolkata (IST, UTC+5:30)</option>
                        <option value="America/New_York">America/New_York (EST, UTC-5)</option>
                        <option value="America/Los_Angeles">America/Los_Angeles (PST, UTC-8)</option>
                        <option value="America/Chicago">America/Chicago (CST, UTC-6)</option>
                        <option value="Europe/London">Europe/London (GMT, UTC+0)</option>
                        <option value="Europe/Paris">Europe/Paris (CET, UTC+1)</option>
                        <option value="Europe/Berlin">Europe/Berlin (CET, UTC+1)</option>
                        <option value="Asia/Dubai">Asia/Dubai (GST, UTC+4)</option>
                        <option value="Asia/Singapore">Asia/Singapore (SGT, UTC+8)</option>
                        <option value="Asia/Tokyo">Asia/Tokyo (JST, UTC+9)</option>
                        <option value="Australia/Sydney">Australia/Sydney (AEST, UTC+10)</option>
                        <option value="Pacific/Auckland">Pacific/Auckland (NZST, UTC+12)</option>
                    </select>
                </div>
            </div>
            <div class="flex items-start mt-4">
                <input type="checkbox" x-model="disclaimer" id="disclaimer" class="mt-1 mr-2" required :disabled="loading">
                <label for="disclaimer" class="text-sm text-slate-300">I accept the terms, conditions, and medical disclaimer.</label>
            </div>
            <div x-show="error" x-cloak class="text-red-400 text-sm" x-text="error"></div>
            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-4 rounded flex justify-center items-center" :disabled="loading">
                <span x-show="loading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white">⭮</span>
                <span x-text="loading ? 'Registering...' : 'Register'"></span>
            </button>
            <div class="text-center text-sm mt-4">
                <a href="index.html" class=" hover:underline">Back to Login</a>
            </div>
        </form>
    </div>
</body>
</html>
