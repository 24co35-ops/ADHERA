<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <script src="config.js"></script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Adhera - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "background": "#0A0C10",
                "primary": "#00f2ff",
                "on-surface": "#e2e2e8",
                "on-surface-variant": "#b9cacb",
                "glass-border": "rgba(255,255,255,0.12)",
                "glass-surface": "rgba(255,255,255,0.05)",
                "surface-container": "#1e2024",
                "status-error": "#EF4444",
                "status-success": "#10B981",
                "status-warning": "#F59E0B",
                "primary-container": "#00f2ff",
                "on-primary-fixed": "#002022",
                "primary-fixed-dim": "#00dbe7"
            }
        }
    }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
body {
    background-color: #0A0C10;
    background-image: radial-gradient(circle at 20% 30%, rgba(0,242,255,0.08) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(111,60,216,0.05) 0%, transparent 40%);
    background-attachment: fixed;
    min-height: 100vh;
    margin: 0;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
}
.glass-panel {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}
[x-cloak] { display: none !important; }
</style>
</head>
<body class="p-6">
<main class="w-full max-w-[440px]">
    <div class="glass-panel rounded-[40px] p-10 md:p-12 flex flex-col gap-10">
        <header class="flex flex-col items-center text-center">
            <div class="relative group mb-10">
                <div class="absolute -inset-6 bg-primary/20 rounded-full blur-3xl opacity-30 group-hover:opacity-50 transition-opacity duration-1000"></div>
                <div class="relative w-24 h-24 rounded-[32px] p-[1px] bg-gradient-to-tr from-white/20 via-transparent to-primary/30 transform group-hover:scale-105 group-hover:rotate-3 transition-all duration-700">
                    <div class="w-full h-full rounded-[31px] bg-white/5 backdrop-blur-2xl flex items-center justify-center relative overflow-hidden shadow-2xl">
                        <div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-white/5 opacity-50"></div>
                        <svg width="60" height="60" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" class="z-10" style="filter:drop-shadow(0 0 15px rgba(0,242,255,0.6))">
                            <defs><linearGradient id="logo-login" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00F2FF"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient></defs>
                            <path d="M100 60L135 140H115L100 105L85 140H65L100 60Z" fill="url(#logo-login)"/>
                            <rect x="92" y="110" width="16" height="4" rx="2" fill="white" fill-opacity="0.8"/>
                        </svg>
                    </div>
                </div>
            </div>
            <h1 class="text-5xl font-extrabold text-on-surface tracking-tighter mb-2 bg-clip-text text-transparent bg-gradient-to-b from-white to-white/60">Adhera</h1>
            <p class="text-on-surface-variant text-[11px] tracking-[0.25em] uppercase font-bold opacity-50">Medication Adherence Platform</p>
        </header>

        <form x-data="loginForm()" @submit.prevent="submit" class="flex flex-col gap-8">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1" for="email">Email Address</label>
                    <input x-model="email" id="email" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-on-surface placeholder:text-white/20 focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/20 transition-all" placeholder="jane@example.com" required type="email"/>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1" for="password">Password</label>
                    <input x-model="password" id="password" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-on-surface placeholder:text-white/20 focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/20 transition-all" placeholder="••••••••" required type="password"/>
                </div>
            </div>

            <div x-show="error" x-cloak class="flex items-center gap-2 text-red-400 text-sm px-1">
                <span class="material-symbols-outlined text-sm">error</span>
                <span x-text="error"></span>
            </div>

            <button type="submit" :disabled="loading" class="w-full bg-primary text-background font-bold py-4 rounded-2xl hover:brightness-110 active:scale-[0.98] transition-all duration-300 shadow-[0_0_25px_rgba(0,242,255,0.2)] flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <template x-if="loading">
                    <svg class="animate-spin h-5 w-5 text-background" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </template>
                <span x-text="loading ? 'Signing in...' : 'Sign In'"></span>
            </button>
        </form>

        <div class="text-center pt-2">
            <p class="text-on-surface-variant text-sm">New to Adhera? <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 transition-all" href="index.html">Create an account</a></p>
        </div>
    </div>
</main>

<script>
const API_BASE_URL = CONFIG.API_BASE;

function loginForm() {
    return {
        email: '',
        password: '',
        loading: false,
        error: null,
        async submit() {
            this.loading = true;
            this.error = null;
            try {
                const res = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: this.email, password: this.password })
                });
                const json = await res.json();
                if (json.success && json.data?.access_token) {
                    localStorage.setItem('access_token', json.data.access_token);
                    const role = json.data.role || 'patient';
                    if (role === 'provider') window.location.href = 'provider/dashboard.html';
                    else if (role === 'admin') window.location.href = 'admin/dashboard.html';
                    else window.location.href = 'dashboard.html';
                } else {
                    this.error = json.error?.message || 'Invalid credentials';
                }
            } catch (err) {
                this.error = 'Network error. Please try again.';
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
</body>
</html>
