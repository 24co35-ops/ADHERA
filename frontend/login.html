<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Adhera - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body {
            background-color: #0A0C10;
            background-image: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(111, 60, 216, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            position: relative;
        }
        .glass-panel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.02;
            pointer-events: none;
            border-radius: inherit;
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e2e2e8;
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            border-color: #00f2ff;
            outline: none;
            box-shadow: 0 0 0 1px rgba(0, 242, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }
        .glow-cyan {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
    </style>
</head>
<body class="text-on-surface p-md">
    <main class="w-full max-w-md">
        <div class="glass-panel rounded-3xl p-lg md:p-xl flex flex-col gap-xl shadow-2xl shadow-primary/10">
            <header class="flex flex-col items-center text-center gap-md">
                <div class="w-20 h-20 rounded-2xl flex items-center justify-center bg-primary/10 border border-glass-border">
                    <span class="material-symbols-outlined text-4xl text-primary glow-cyan" style="font-variation-settings: 'FILL' 1;">medical_services</span>
                </div>
                <h1 class="font-display-md text-display-md text-primary tracking-tighter">Adhera</h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Sign in to your secure account</p>
            </header>
            <form id="loginForm" class="flex flex-col gap-lg">
                <div class="flex flex-col gap-md">
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-lg text-on-surface-variant" for="email">Email Address</label>
                        <input class="input-glass w-full rounded-xl py-md px-md h-12" id="email" name="email" placeholder="jane@example.com" required type="email"/>
                    </div>
                    <div class="flex flex-col gap-xs">
                        <label class="font-label-lg text-on-surface-variant" for="password">Password</label>
                        <input class="input-glass w-full rounded-xl py-md px-md h-12" id="password" name="password" placeholder="••••••••" required type="password"/>
                    </div>
                </div>
                <button class="w-full bg-primary text-on-primary-fixed font-label-lg py-md rounded-xl hover:bg-primary-fixed transition-all duration-300 shadow-lg shadow-primary/20" type="submit">
                    Sign In
                </button>
            </form>
            <div class="text-center">
                <p class="font-body-md text-label-sm text-on-surface-variant">
                    Don't have an account? <a class="text-primary font-label-lg hover:text-primary-fixed underline decoration-primary/30 underline-offset-2" href="index.html">Register here</a>
                </p>
            </div>
        </div>
    </main>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const credentials = {
                email: formData.get('email'),
                password: formData.get('password')
            };
            const result = await login(credentials);
            if (result.access_token) {
                window.location.href = 'dashboard.html';
            } else {
                alert('Login failed: ' + (result.detail || 'Unknown error'));
            }
        });
    </script>
</body>
</html>
