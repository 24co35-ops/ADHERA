<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Adhera - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': '#00f2ff',
                        'background': '#0A0C10',
                        'glass-surface': 'rgba(255, 255, 255, 0.05)',
                        'glass-border': 'rgba(255, 255, 255, 0.12)',
                        'on-surface': '#e2e2e8',
                        'on-surface-variant': '#9ca3af',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body {
            background-color: #0A0C10;
            background-image: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(111, 60, 216, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .glow-cyan {
            filter: drop-shadow(0 0 8px rgba(0, 242, 255, 0.4));
        }
        .input-focus:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 0 1px rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body class="p-6">
    <main class="w-full max-w-[440px] animate-in fade-in duration-700">
        <div class="glass-panel rounded-[40px] p-10 md:p-12 flex flex-col gap-10">
            <header class="flex flex-col items-center text-center">
                <!-- Proper Adhera Logo Component -->
                <div class="relative group mb-10">
                    <!-- Diffuse outer glow -->
                    <div class="absolute -inset-6 bg-primary/20 rounded-full blur-3xl opacity-30 group-hover:opacity-50 transition-opacity duration-1000"></div>
                    
                    <!-- Outer thin border glass -->
                    <div class="relative w-24 h-24 rounded-[32px] p-[1px] bg-gradient-to-tr from-white/20 via-transparent to-primary/30 transform group-hover:scale-105 group-hover:rotate-3 transition-all duration-700">
                        <!-- Main glass body -->
                        <div class="w-full h-full rounded-[31px] bg-white/5 backdrop-blur-2xl flex items-center justify-center relative overflow-hidden shadow-2xl">
                            <!-- Animated shimmer background -->
                            <div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-white/5 opacity-50"></div>
                            
                            <!-- High-fidelity icon -->
                            <span class="material-symbols-outlined text-5xl text-primary z-10" 
                                  style="font-variation-settings: 'FILL' 1, 'wght' 200; filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.6));">
                                medical_services
                            </span>
                            
                            <!-- Moving highlight -->
                            <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/10 to-transparent -translate-x-[200%] group-hover:translate-x-[200%] transition-transform duration-1000 ease-in-out"></div>
                        </div>
                    </div>
                </div>

                <h1 class="text-5xl font-extrabold text-on-surface tracking-tighter mb-2 bg-clip-text text-transparent bg-gradient-to-b from-white to-white/60">Adhera</h1>
                <p class="text-on-surface-variant text-[11px] tracking-[0.25em] uppercase font-bold opacity-50">Medication Adherence Platform</p>
            </header>

            <form id="loginForm" class="flex flex-col gap-8">
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1" for="email">Email Address</label>
                        <input class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-on-surface placeholder:text-white/20 focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/20 transition-all input-focus" id="email" name="email" placeholder="jane@example.com" required type="email"/>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1" for="password">Password</label>
                        <input class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-on-surface placeholder:text-white/20 focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/20 transition-all input-focus" id="password" name="password" placeholder="••••••••" required type="password"/>
                    </div>
                </div>
                
                <button class="w-full bg-primary text-background font-bold py-4 rounded-2xl hover:brightness-110 active:scale-[0.98] transition-all duration-300 shadow-[0_0_25px_rgba(0,242,255,0.2)]" type="submit">
                    Sign In
                </button>
            </form>

            <div class="text-center pt-2">
                <p class="text-on-surface-variant text-sm">
                    New to Adhera? <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 transition-all" href="index.html">Create an account</a>
                </p>
            </div>
        </div>
    </main>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const credentials = {
                email: formData.get('email'),
                password: formData.get('password')
            };
            const result = await login(credentials);
            if (result.access_token) {
                window.location.href = 'dashboard.html';
            } else {
                alert('Login failed: ' + (result.detail || 'Unknown error'));
            }
        });
    </script>
</body>
</html>
