<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhera - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="dashboardData()" class="min-h-screen flex flex-col">
    <!-- Nav Header -->
    <nav class="glass p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="text-xl font-bold text-cyan-400">Adhera</div>
        <div class="space-x-4">
            <a href="dashboard.html" class="hover:text-cyan-400">Dashboard</a>
            <a href="medicines.html" class="hover:text-cyan-400">Medicines</a>
            <a href="feedback.html" class="hover:text-cyan-400">Feedback</a>
            <button @click="logout" class="text-red-400 hover:text-red-300">Logout</button>
        </div>
    </nav>

    <main class="flex-1 p-6 max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Schedule Column -->
        <div class="md:col-span-2 space-y-6">
            <div class="glass p-6 rounded-xl relative">
                <h2 class="text-2xl font-bold mb-4">Today's Schedule</h2>
                <div x-show="dosesLoading" class="text-slate-400 text-sm">Loading...</div>
                <div x-show="!dosesLoading && doses.length === 0" class="text-slate-400">No doses pending today.</div>
                <div class="space-y-4">
                    <template x-for="dose in doses" :key="dose.id">
                        <div class="bg-slate-800/50 p-4 rounded border border-slate-700 flex justify-between items-center">
                            <div>
                                <div class="font-bold text-lg" x-text="dose.reminders?.medicines?.name"></div>
                                <div class="text-sm text-slate-400" x-text="dose.reminders?.medicines?.dosage_amount + ' ' + dose.reminders?.medicines?.dosage_unit + ' • ' + dose.reminders?.dose_label"></div>
                            </div>
                            <div class="space-x-2">
                                <button @click="action(dose.id, 'taken')" class="bg-green-600 hover:bg-green-500 px-3 py-1 rounded text-sm font-bold disabled:opacity-50" :disabled="actionLoading === dose.id">Taken</button>
                                <button @click="action(dose.id, 'snoozed')" class="bg-yellow-600 hover:bg-yellow-500 px-3 py-1 rounded text-sm font-bold disabled:opacity-50" :disabled="actionLoading === dose.id || dose.snooze_count >= 3">Snooze</button>
                                <button @click="action(dose.id, 'missed')" class="bg-red-600 hover:bg-red-500 px-3 py-1 rounded text-sm font-bold disabled:opacity-50" :disabled="actionLoading === dose.id">Missed</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Charts -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-xl">
                    <h3 class="text-lg font-bold mb-2 flex items-center justify-between">
                        Weekly Adherence
                        <span x-show="stats.weekly_warning" class="bg-red-900/50 text-red-400 text-xs px-2 py-1 rounded border border-red-500/50">⚠ Below target</span>
                    </h3>
                    <div class="relative h-40 w-full"><canvas id="weeklyChart"></canvas></div>
                </div>
                <div class="glass p-6 rounded-xl">
                    <h3 class="text-lg font-bold mb-2">Monthly Trend</h3>
                    <div class="relative h-40 w-full"><canvas id="monthlyChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="space-y-6">
            <div class="glass p-6 rounded-xl">
                <h3 class="text-lg font-bold mb-4">Recent Feedback</h3>
                <div class="space-y-3">
                    <template x-for="fb in feedback" :key="fb.id">
                        <div class="text-sm bg-slate-800/50 p-3 rounded">
                            <div class="flex justify-between text-slate-400 text-xs mb-1">
                                <span x-text="new Date(fb.created_at).toLocaleDateString()"></span>
                                <span x-text="'Sev ' + fb.severity" :class="fb.severity >= 3 ? 'text-red-400' : 'text-yellow-400'"></span>
                            </div>
                            <div class="truncate" x-text="fb.description"></div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </main>

    <script>
        const config = { SUPABASE_URL: "http://localhost:8000", SUPABASE_JS_URL: "supabase_url", SUPABASE_ANON: "anon_key" };
        
        function dashboardData() {
            return {
                token: sessionStorage.getItem('jwt'),
                doses: [], dosesLoading: true, actionLoading: null,
                stats: { weekly_adherence: 0, monthly_adherence: 0, weekly_warning: false },
                feedback: [],
                charts: {},
                
                async init() {
                    if (!this.token) return window.location.href = 'index.html';
                    const payload = JSON.parse(atob(this.token.split('.')[1]));
                    if (payload.role !== 'patient') {
                        if (payload.role === 'patient') return window.location.href = 'dashboard.html';
                        if (payload.role === 'provider') return window.location.href = 'provider-dashboard.html';
                        if (payload.role === 'admin') return window.location.href = 'admin-dashboard.html';
                        return window.location.href = 'index.html';
                    }
                    await Promise.all([this.fetchDoses(), this.fetchStats(), this.fetchFeedback()]);
                    this.initCharts();
                    this.setupRealtime();
                },
                async api(path, method = 'GET', body = null) {
                    const opts = { method, headers: { 'Authorization': `Bearer ${this.token}`, 'Content-Type': 'application/json' } };
                    if (body) opts.body = JSON.stringify(body);
                    const res = await fetch(`${config.SUPABASE_URL}/v1${path}`, opts);
                    if (res.status === 401) { sessionStorage.removeItem('jwt'); window.location.href = 'index.html'; }
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error?.message || "API Error");
                    return data.data;
                },
                async fetchDoses() {
                    try { this.doses = await this.api('/doses/upcoming'); } catch(e){} finally { this.dosesLoading = false; }
                },
                async fetchStats() {
                    try { this.stats = await this.api('/analytics/dashboard'); this.updateCharts(); } catch(e){}
                },
                async fetchFeedback() {
                    try { const res = await this.api('/feedback/'); this.feedback = res.slice(0,3); } catch(e){}
                },
                async action(doseId, status) {
                    this.actionLoading = doseId;
                    try { await this.api(`/doses/${doseId}/status`, 'POST', { status }); await this.fetchDoses(); } catch(e){}
                    finally { this.actionLoading = null; }
                },
                logout() { sessionStorage.removeItem('jwt'); window.location.href = 'index.html'; },
                
                initCharts() {
                    const wc = document.getElementById('weeklyChart');
                    const mc = document.getElementById('monthlyChart');
                    if(wc) this.charts.weekly = new Chart(wc, { type: 'bar', data: { labels: ['Adherence'], datasets: [{ label: '%', data: [this.stats.weekly_adherence], backgroundColor: '#22d3ee' }] }, options: { indexAxis: 'y', scales: { x: { max: 100 } }, maintainAspectRatio: false } });
                    if(mc) this.charts.monthly = new Chart(mc, { type: 'line', data: { labels: ['Current'], datasets: [{ label: '%', data: [this.stats.monthly_adherence], borderColor: '#22d3ee' }] }, options: { scales: { y: { min: 0, max: 100 } }, maintainAspectRatio: false } });
                },
                updateCharts() {
                    if (this.charts.weekly) { this.charts.weekly.data.datasets[0].data = [this.stats.weekly_adherence]; this.charts.weekly.update(); }
                    if (this.charts.monthly) { this.charts.monthly.data.datasets[0].data = [this.stats.monthly_adherence]; this.charts.monthly.update(); }
                },
                setupRealtime() {
                    // Supposed to use Supabase JS CDN.
                    const supabase = window.supabase.createClient(config.SUPABASE_JS_URL, config.SUPABASE_ANON);
                    const user_id = JSON.parse(atob(this.token.split('.')[1])).sub;
                    supabase.channel('adherence_changes')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'adherence', filter: `user_id=eq.${user_id}` }, () => {
                            this.fetchDoses(); this.fetchStats();
                        }).subscribe();
                }
            }
        }
    </script>
</body>
</html>
