<!DOCTYPE html>
<html lang="en">
<head>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicons/logo.svg?v=3">
    <link rel="shortcut icon" href="/assets/favicons/favicon.ico?v=3" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png?v=3">
    <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicons/favicon-48x48.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/favicon-180x180.png?v=3">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#6366f1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhera - Feedback</title>
    <link rel="stylesheet" href="/css/adhera.css">
    <script type="module" src="js/i18n.js"></script>
    <script src="js/nav.js"></script>
    
    <script defer src="/js/alpine-collapse.min.js"></script>
    <script defer src="/js/alpine.min.js"></script>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background: #111318; color: #e2e2e8; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px; }
        input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.12) !important; color: #e2e2e8 !important; border-radius: 12px !important; }
        input:focus, select:focus, textarea:focus { outline: none !important; border-color: #00dbe7 !important; }
        button[type="submit"], button.bg-cyan-600 { background: #00dbe7 !important; color: #002022 !important; border-radius: 12px !important; }
        button.bg-slate-700 { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.12) !important; border-radius: 12px !important; }
        select option { background-color: #1a1d24 !important; color: #e2e2e8 !important; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="feedbackData()" class="min-h-screen flex flex-col">
    <!-- Nav Header -->
    <div id="nav-root"></div>
    <script>
        renderNav('feedback');
    </script>

    <main class="flex-1 p-6 max-w-3xl mx-auto w-full space-y-6">
        <div class="glass p-6 rounded-xl relative">
            <h2 class="text-2xl font-bold mb-4">Report Feedback/Side Effect</h2>
            
            <div x-show="form.severity == '4'" x-cloak class="bg-red-900/50 text-red-200 border border-red-500 p-4 rounded mb-4">
                <strong>Warning:</strong> You have selected Emergency severity. Submitting this will immediately alert your provider and emergency contacts.
            </div>

            <form @submit.prevent="attemptSubmit" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Medicine</label>
                    <select x-model="form.medicine_id" class="w-full p-2 rounded bg-transparent border-transparent text-white" required :disabled="loading">
                        <template x-for="med in medicines" :key="med.id">
                            <option :value="med.id" x-text="med.name"></option>
                        </template>
                    </select>
                </div>
                <div>
                    <label class="block text-sm mb-1 flex justify-between">
                        <span>Description</span>
                        <span class="text-slate-400 text-xs" x-text="(2000 - form.description.length) + ' left'"></span>
                    </label>
                    <textarea x-model="form.description" maxlength="2000" rows="4" class="w-full p-2 rounded bg-transparent border-transparent text-white" required :disabled="loading"></textarea>
                </div>
                <div>
                    <label class="block text-sm mb-1">Occurrence Datetime</label>
                    <input type="datetime-local" x-model="form.occurrence_datetime" class="w-full p-2 rounded text-white" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.12);" required :disabled="loading">
                </div>
                <div>
                    <label class="block text-sm mb-1">Severity</label>
                    <select x-model="form.severity" class="w-full p-2 rounded bg-transparent border-transparent text-white" required :disabled="loading">
                        <option value="1">1 — Mild (minor discomfort)</option>
                        <option value="2">2 — Moderate (affects daily activity)</option>
                        <option value="3">3 — Severe (requires medical attention)</option>
                        <option value="4">4 — Emergency (call emergency services)</option>
                    </select>
                </div>
                <div class="flex justify-end">
                    <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-6 rounded disabled:opacity-50" :disabled="loading">Submit</button>
                </div>
            </form>
        </div>

        <div class="glass p-6 rounded-xl">
            <h3 class="text-xl font-bold mb-4">History</h3>
            <div class="space-y-3">
                <template x-for="fb in history" :key="fb.id">
                    <div class="bg-transparent/50 p-4 rounded border border-white/10 mb-3">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <span class="font-bold text-cyan-400 block" x-text="getMedicineName(fb.medicine_id)"></span>
                                <span class="text-xs text-slate-400" x-text="'Occurred: ' + new Date(fb.occurred_at).toLocaleString()"></span>
                            </div>
                            <div class="px-2 py-1 rounded text-xs font-bold" :class="{'bg-red-900/50 text-red-400': fb.severity >= 3, 'bg-yellow-900/50 text-yellow-400': fb.severity < 3}" x-text="'Sev ' + fb.severity"></div>
                        </div>
                        <div class="text-sm text-slate-200" x-text="fb.description"></div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <!-- Emergency Modal -->
    <div x-show="showModal" x-cloak class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-transparent border border-red-500 p-8 rounded-xl max-w-md w-full text-center space-y-6">
            <h3 class="text-2xl font-bold text-red-500">EMERGENCY</h3>
            <p class="text-lg">If you are in immediate danger, please call <strong>112</strong> or your local emergency services immediately.</p>
            <div class="flex flex-col space-y-3">
                <button @click="submit" class="bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-4 rounded w-full">I understand, continue</button>
                <button @click="showModal = false" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2 px-4 rounded w-full">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const _token = sessionStorage.getItem('adhera_token');
        if (!_token) { window.location.href = 'index.html'; throw new Error('No token'); }
        const _payload = JSON.parse(atob(_token.split('.')[1]));
        const _role = _payload.app_metadata?.role || _payload.user_metadata?.role || _payload.role;
        if (_role !== 'patient') window.location.href = 'index.html';

        const config = { SUPABASE_URL: CONFIG.API_BASE.replace("/v1", "") };
        function feedbackData() {
            return {
                token: sessionStorage.getItem('adhera_token'),
                medicines: [], history: [], loading: false, showModal: false,
                form: { medicine_id: '', description: '', severity: '1', occurrence_datetime: new Date().toISOString().slice(0, 16) },
                async init() {
                    await Promise.all([this.fetchMedicines(), this.fetchHistory()]);
                },
                async api(path, method = 'GET', body = null) {
                    const opts = { method, headers: { 'Authorization': `Bearer ${this.token}`, 'Content-Type': 'application/json' } };
                    if (body) opts.body = JSON.stringify(body);
                    const res = await fetch(`${CONFIG.API_BASE}${path}`, opts);
                    if (res.status === 401) { sessionStorage.removeItem('adhera_token'); window.location.href = 'index.html'; }
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error?.message || "API Error");
                    return data.data;
                },
                async fetchMedicines() {
                    try { this.medicines = await this.api('/medicines/'); if(this.medicines.length) this.form.medicine_id = this.medicines[0].id; } catch(e){}
                },
                async fetchHistory() {
                    try { this.history = await this.api('/feedback/'); this.history.reverse(); } catch(e){}
                },
                getMedicineName(id) {
                    const med = this.medicines.find(m => m.id === id);
                    return med ? med.name : 'Unknown Medicine';
                },
                attemptSubmit() {
                    if (this.form.severity == 4) this.showModal = true;
                    else this.submit();
                },
                async submit() {
                    this.showModal = false; this.loading = true;
                    try {
                        const body = {
                            medicine_id: this.form.medicine_id,
                            description: this.form.description,
                            severity: parseInt(this.form.severity),
                            occurrence_datetime: new Date(this.form.occurrence_datetime).toISOString()
                        };
                        console.log("Sending feedback payload:", JSON.stringify(body));
                        await this.api('/feedback/', 'POST', body);
                        this.form.description = ''; this.form.severity = '1';
                        this.form.occurrence_datetime = new Date().toISOString().slice(0, 16);
                        await this.fetchHistory();
                    } catch(e){} finally { this.loading = false; }
                },
                async logout() { await window.adheraLogout(); }
            }
        }
    </script>
</body>
</html>
