<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Adhera - Secure Registration</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#0A0C10",
                        "primary": "#00f2ff",
                        "on-surface": "#e2e2e8",
                        "on-surface-variant": "#9ca3af",
                        "glass-surface": "rgba(255, 255, 255, 0.05)",
                        "glass-border": "rgba(255, 255, 255, 0.12)",
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body {
            background-color: #0A0C10;
            background-image: radial-gradient(circle at 15% 15%, rgba(0, 242, 255, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 85% 85%, rgba(111, 60, 216, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .glow-cyan {
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="text-on-surface flex items-center justify-center p-6 antialiased">
    <main class="w-full max-w-[480px]">
        <div class="glass-card rounded-[48px] p-8 md:p-12 flex flex-col gap-10">
            <!-- Header -->
            <header class="flex flex-col items-center text-center">
                <div class="relative group mb-8">
                    <div class="absolute -inset-6 bg-primary/20 rounded-full blur-3xl opacity-30 group-hover:opacity-50 transition-opacity duration-1000"></div>
                    <div class="relative w-20 h-20 rounded-[28px] p-[1px] bg-gradient-to-tr from-white/20 via-transparent to-primary/30 transform group-hover:scale-105 transition-transform duration-700">
                        <div class="w-full h-full rounded-[27px] bg-white/5 backdrop-blur-2xl flex items-center justify-center relative overflow-hidden">
                            <svg width="48" height="48" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" class="glow-cyan z-10">
                                <defs>
                                    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="#00F2FF" />
                                        <stop offset="100%" stop-color="#3B82F6" />
                                    </linearGradient>
                                </defs>
                                <path d="M100 60L135 140H115L100 105L85 140H65L100 60Z" fill="url(#logo-grad)" />
                                <rect x="92" y="110" width="16" height="4" rx="2" fill="white" fill-opacity="0.8" />
                            </svg>
                        </div>
                    </div>
                </div>
                <h1 class="text-4xl font-extrabold tracking-tighter mb-2 bg-clip-text text-transparent bg-gradient-to-b from-white to-white/60">Adhera</h1>
                <p class="text-on-surface-variant text-[10px] tracking-[0.2em] uppercase font-bold opacity-60">Create your secure account</p>
            </header>

            <!-- Registration Form -->
            <form id="registrationForm" class="flex flex-col gap-8">
                <!-- Role Selection -->
                <div class="space-y-4">
                    <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">I am registering as a:</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer group">
                            <input type="radio" name="role" value="patient" checked class="sr-only peer">
                            <div class="p-4 rounded-2xl border border-white/10 bg-white/5 peer-checked:border-primary peer-checked:bg-primary/10 transition-all flex flex-col items-center gap-2 group-hover:border-white/20">
                                <span class="material-symbols-outlined text-2xl opacity-60 peer-checked:opacity-100 peer-checked:text-primary">person</span>
                                <span class="text-sm font-medium">Patient</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" name="role" value="provider" class="sr-only peer">
                            <div class="p-4 rounded-2xl border border-white/10 bg-white/5 peer-checked:border-primary peer-checked:bg-primary/10 transition-all flex flex-col items-center gap-2 group-hover:border-white/20">
                                <span class="material-symbols-outlined text-2xl opacity-60 peer-checked:opacity-100 peer-checked:text-primary">medical_services</span>
                                <span class="text-sm font-medium">Provider</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Fields -->
                <div class="space-y-5">
                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1" for="fullName">Full Name</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl group-focus-within:text-primary transition-colors">badge</span>
                            <input type="text" id="fullName" name="fullName" required placeholder="Jane Doe"
                                   class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-5 text-on-surface placeholder:text-white/20 focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/20 transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1" for="email">Email Address</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl group-focus-within:text-primary transition-colors">mail</span>
                            <input type="email" id="email" name="email" required placeholder="jane@example.com"
                                   class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-5 text-on-surface placeholder:text-white/20 focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/20 transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1" for="password">Password</label>
                        <div class="relative group">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-xl group-focus-within:text-primary transition-colors">lock</span>
                            <input type="password" id="password" name="password" required placeholder="••••••••"
                                   class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-5 text-on-surface placeholder:text-white/20 focus:outline-none focus:border-primary/40 focus:ring-1 focus:ring-primary/20 transition-all">
                        </div>
                    </div>
                </div>

                <!-- Terms -->
                <div class="flex items-start gap-3 px-1">
                    <input type="checkbox" id="terms" required class="mt-1 w-5 h-5 rounded border-white/10 bg-white/5 text-primary focus:ring-primary/20">
                    <label for="terms" class="text-xs text-on-surface-variant leading-relaxed">
                        I acknowledge the mandatory <a href="#" class="text-primary hover:underline">Legal Disclaimer</a> and agree to the terms of service.
                    </label>
                </div>

                <button type="submit" class="w-full bg-primary text-background font-bold py-4 rounded-2xl hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-[0_0_25px_rgba(0,242,255,0.2)]">
                    Complete Registration
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </form>

            <footer class="text-center pt-2">
                <p class="text-sm text-on-surface-variant">
                    Already have an account? <a href="login.html" class="text-primary font-semibold hover:underline">Sign in here</a>
                </p>
            </footer>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const userData = {
                email: formData.get('email'),
                password: formData.get('password'),
                full_name: formData.get('fullName'),
                role: formData.get('role'),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = 'Registering...';

            try {
                const result = await register(userData);
                if (result.message) {
                    alert(result.message);
                    window.location.href = 'login.html';
                } else {
                    alert('Registration failed: ' + (result.detail || 'Check your details'));
                }
            } catch (err) {
                alert('An error occurred. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
