<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhera - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center" x-data="loginData()">
    <div class="glass p-8 rounded-xl shadow-2xl w-full max-w-md">
        <h1 class="text-3xl font-bold mb-6 text-cyan-400 text-center">Adhera</h1>
        <form @submit.prevent="login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" x-model="email" class="w-full p-2 rounded bg-slate-800 border border-slate-700 text-white" required :disabled="loading">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" x-model="password" class="w-full p-2 rounded bg-slate-800 border border-slate-700 text-white" required :disabled="loading">
            </div>
            <div x-show="error" x-cloak class="text-red-400 text-sm" x-text="error"></div>
            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-4 rounded transition-colors flex justify-center items-center" :disabled="loading">
                <svg x-show="loading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span x-text="loading ? 'Logging in...' : 'Login'"></span>
            </button>
            <div class="text-center text-sm mt-4">
                <a href="register.html" class="text-cyan-400 hover:underline">Create an account</a>
            </div>
        </form>
    </div>

    <script>
        const config = {
            SUPABASE_URL: "http://localhost:8000", // API URL for local dev
            SUPABASE_ANON_KEY: "anon_key_here"
        };
        
        function loginData() {
            return {
                email: '', password: '', error: null, loading: false,
                async login() {
                    this.error = null; this.loading = true;
                    try {
                        const res = await fetch(`${config.SUPABASE_URL}/v1/auth/login`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: this.email, password: this.password })
                        });
                        const data = await res.json();
                        if (!data.success) throw new Error(data.error?.message || "Login failed");
                        
                        const token = data.data.access_token;
                        sessionStorage.setItem("jwt", token);
                        
                        // Decode JWT payload without library
                        const payload = JSON.parse(atob(token.split('.')[1]));
                        const role = payload.user_metadata?.role || 'patient';
                        
                        if (role === 'provider') window.location.href = 'provider-dashboard.html';
                        else if (role === 'admin') window.location.href = 'admin-dashboard.html';
                        else window.location.href = 'dashboard.html';
                        
                    } catch (e) { this.error = e.message; }
                    finally { this.loading = false; }
                }
            }
        }
    </script>
</body>
</html>
