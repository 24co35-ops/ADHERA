<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Adhera - Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': '#00f2ff',
                        'background': '#0A0C10',
                        'glass-surface': 'rgba(255, 255, 255, 0.05)',
                        'glass-border': 'rgba(255, 255, 255, 0.12)',
                        'on-surface': '#e2e2e8',
                        'on-surface-variant': '#9ca3af',
                        'status-error': '#EF4444',
                        'status-success': '#10B981',
                        'status-warning': '#F59E0B',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #0A0C10;
            background-image: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(111, 60, 216, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .glow-cyan {
            filter: drop-shadow(0 0 8px rgba(0, 242, 255, 0.4));
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e2e2e8;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: #00f2ff;
            outline: none;
            box-shadow: 0 0 0 1px rgba(0, 242, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="text-on-surface min-h-screen flex items-center justify-center p-md md:p-3xl font-body-md antialiased overflow-x-hidden">
<!-- Registration Card -->
<main class="w-full max-w-md relative z-10">
<div class="glass-panel rounded-[40px] p-8 md:p-12 relative z-10 flex flex-col gap-10">
<!-- Header Section -->
<header class="flex flex-col items-center text-center">
    <!-- Proper Adhera Logo Component -->
    <div class="relative group mb-10">
        <div class="absolute -inset-6 bg-primary/20 rounded-full blur-3xl opacity-30 group-hover:opacity-50 transition-opacity duration-1000"></div>
        <div class="relative w-24 h-24 rounded-[32px] p-[1px] bg-gradient-to-tr from-white/20 via-transparent to-primary/30 transform group-hover:scale-105 group-hover:rotate-3 transition-all duration-700">
            <div class="w-full h-full rounded-[31px] bg-white/5 backdrop-blur-2xl flex items-center justify-center relative overflow-hidden shadow-2xl">
                <div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-white/5 opacity-50"></div>
                <span class="material-symbols-outlined text-5xl text-primary z-10 filter drop-shadow(0 0 15px rgba(0, 242, 255, 0.6))" 
                      style="font-variation-settings: 'FILL' 1, 'wght' 200;">
                    medical_services
                </span>
                <div class="absolute inset-0 bg-gradient-to-tr from-transparent via-white/20 to-transparent -translate-x-[200%] group-hover:translate-x-[200%] transition-transform duration-1000 ease-in-out"></div>
            </div>
        </div>
    </div>

    <h1 class="text-4xl font-extrabold text-on-surface tracking-tighter mb-2 bg-clip-text text-transparent bg-gradient-to-b from-white to-white/60">Adhera</h1>
    <p class="text-on-surface-variant text-[10px] tracking-[0.2em] uppercase font-bold opacity-60">Create your secure account</p>
</header>
<!-- Registration Form -->
<form aria-label="Registration Form" class="flex flex-col gap-lg">
<!-- Role Selection -->
<fieldset class="flex flex-col gap-sm">
<legend class="font-label-lg text-label-lg text-on-surface-variant mb-xs">I am registering as a:</legend>
<div class="grid grid-cols-2 gap-md">
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="role" type="radio" value="patient"/>
<div class="glass-panel rounded-xl p-md text-center border-glass-border peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary transition-all duration-300 flex flex-col items-center gap-sm">
<span aria-hidden="true" class="material-symbols-outlined text-2xl" data-icon="person">person</span>
<span class="font-label-lg text-label-lg">Patient</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="role" type="radio" value="provider"/>
<div class="glass-panel rounded-xl p-md text-center border-glass-border peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-primary transition-all duration-300 flex flex-col items-center gap-sm">
<span aria-hidden="true" class="material-symbols-outlined text-2xl" data-icon="medical_services">medical_services</span>
<span class="font-label-lg text-label-lg">Provider</span>
</div>
</label>
</div>
</fieldset>
<!-- Input Fields -->
<div class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="fullName">Full Name</label>
<div class="relative">
<span aria-hidden="true" class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="badge">badge</span>
<input class="input-glass w-full rounded-lg py-sm pl-3xl pr-md font-body-md text-body-md h-12" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span aria-hidden="true" class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="mail">mail</span>
<input class="input-glass w-full rounded-lg py-sm pl-3xl pr-md font-body-md text-body-md h-12" id="email" name="email" placeholder="jane@example.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span aria-hidden="true" class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="lock">lock</span>
<input class="input-glass w-full rounded-lg py-sm pl-3xl pr-md font-body-md text-body-md h-12" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Legal Disclaimer -->
<div class="flex items-start gap-sm mt-sm">
<div class="flex items-center h-5 mt-1">
<input class="w-5 h-5 rounded border-glass-border bg-glass-surface text-primary focus:ring-primary focus:ring-offset-background cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
</div>
<label class="font-body-md text-label-sm text-on-surface-variant cursor-pointer" for="terms">
                        I acknowledge the mandatory <a class="text-primary hover:text-primary-fixed underline decoration-primary/30 underline-offset-2 transition-colors" href="#">Legal Disclaimer</a> and agree to the terms of service and privacy policy for secure medical data handling.
                    </label>
</div>
<!-- Submit Action -->
<button class="w-full bg-primary text-on-primary-fixed font-label-lg text-label-lg py-md px-lg rounded-xl flex justify-center items-center gap-sm hover:bg-primary-fixed transition-colors duration-300 shadow-lg shadow-primary/20 mt-md" type="submit">
<span>Complete Registration</span>
<span aria-hidden="true" class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="text-center mt-md">
<p class="font-body-md text-label-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-label-lg hover:text-primary-fixed transition-colors" href="login.html">Sign in here</a>
</p>
</div>
</div>
</main>
<script src="js/auth.js"></script>
<script>
    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const userData = {
            email: formData.get('email'),
            password: formData.get('password'),
            full_name: formData.get('fullName'),
            role: formData.get('role'),
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
        };
        const result = await register(userData);
        if (result.message) {
            alert(result.message);
            window.location.href = 'login.html';
        } else {
            console.error('Registration error:', result);
            alert('Registration failed: ' + (result.detail || 'Please check your information and try again.'));
        }
    });

        // Micro-interaction for form inputs focusing
        document.querySelectorAll('.input-glass').forEach(input => {
            input.addEventListener('focus', function() {
                const icon = this.previousElementSibling;
                if(icon && icon.classList.contains('material-symbols-outlined')) {
                    icon.classList.remove('text-on-surface-variant');
                    icon.classList.add('text-primary');
                    icon.style.fontVariationSettings = "'FILL' 1";
                }
            });
            
            input.addEventListener('blur', function() {
                const icon = this.previousElementSibling;
                if(icon && icon.classList.contains('material-symbols-outlined')) {
                    icon.classList.add('text-on-surface-variant');
                    icon.classList.remove('text-primary');
                    icon.style.fontVariationSettings = "'FILL' 0";
                }
            });
        });
    </script>
</body></html>
