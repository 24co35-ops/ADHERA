<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhera Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="adminData()" class="min-h-screen flex flex-col">
    <!-- Nav Header -->
    <nav class="glass p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="text-xl font-bold text-cyan-400">Adhera Admin</div>
        <div class="space-x-4">
            <button @click="logout" class="text-red-400 hover:text-red-300">Logout</button>
        </div>
    </nav>

    <main class="flex-1 p-6 max-w-5xl mx-auto w-full space-y-6">
        <div class="glass p-6 rounded-xl relative">
            <h2 class="text-2xl font-bold mb-4">Pending Provider Approvals</h2>
            <div x-show="pending.length === 0" class="text-slate-400">No pending approvals.</div>
            <div class="space-y-4">
                <template x-for="p in pending" :key="p.id">
                    <div class="bg-slate-800/50 p-4 rounded border border-slate-700 flex justify-between items-center">
                        <div>
                            <div class="font-bold text-lg" x-text="p.full_name"></div>
                            <div class="text-sm text-slate-400" x-text="p.email"></div>
                        </div>
                        <div class="space-x-2">
                            <button @click="approve(p.id)" class="bg-green-600 hover:bg-green-500 px-3 py-1 rounded text-sm font-bold">Approve</button>
                            <button @click="reject(p.id)" class="bg-red-600 hover:bg-red-500 px-3 py-1 rounded text-sm font-bold">Reject</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="glass p-6 rounded-xl relative">
            <h2 class="text-2xl font-bold mb-4">Assignments</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-700">
                            <th class="p-3">Patient ID</th>
                            <th class="p-3">Provider ID</th>
                            <th class="p-3">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="a in assignments" :key="a.id">
                            <tr class="border-b border-slate-800">
                                <td class="p-3 text-sm" x-text="a.patient_id"></td>
                                <td class="p-3 text-sm" x-text="a.provider_id"></td>
                                <td class="p-3 text-sm" x-text="a.status"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const config = { SUPABASE_URL: "http://localhost:8000" };
        function adminData() {
            return {
                token: sessionStorage.getItem('jwt'),
                pending: [], assignments: [],
                async init() {
                    if (!this.token) return window.location.href = 'index.html';
                    const payload = JSON.parse(atob(this.token.split('.')[1]));
                    if (payload.role !== 'admin') {
                        if (payload.role === 'patient') return window.location.href = 'dashboard.html';
                        if (payload.role === 'provider') return window.location.href = 'provider-dashboard.html';
                        if (payload.role === 'admin') return window.location.href = 'admin-dashboard.html';
                        return window.location.href = 'index.html';
                    }
                    await Promise.all([this.fetchPending(), this.fetchAssignments()]);
                },
                async api(path, method = 'GET', body = null) {
                    const opts = { method, headers: { 'Authorization': `Bearer ${this.token}`, 'Content-Type': 'application/json' } };
                    if (body) opts.body = JSON.stringify(body);
                    const res = await fetch(`${config.SUPABASE_URL}/v1${path}`, opts);
                    if (res.status === 401) { sessionStorage.removeItem('jwt'); window.location.href = 'index.html'; }
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error?.message || "API Error");
                    return data.data;
                },
                async fetchPending() { try { this.pending = await this.api('/admin/providers/pending'); } catch(e){} },
                async fetchAssignments() { try { this.assignments = await this.api('/admin/assignments'); } catch(e){} },
                async approve(id) { try { await this.api(`/admin/providers/${id}/approve`, 'POST'); await this.fetchPending(); } catch(e){} },
                async reject(id) { try { await this.api(`/admin/providers/${id}/reject`, 'POST'); await this.fetchPending(); } catch(e){} },
                logout() { sessionStorage.removeItem('jwt'); window.location.href = 'index.html'; }
            }
        }
    </script>
</body>
</html>
