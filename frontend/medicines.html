<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhera - Medicines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="medicinesData()" class="min-h-screen flex flex-col">
    <!-- Nav Header -->
    <nav class="glass p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="text-xl font-bold text-cyan-400">Adhera</div>
        <div class="space-x-4">
            <a href="dashboard.html" class="hover:text-cyan-400">Dashboard</a>
            <a href="medicines.html" class="hover:text-cyan-400">Medicines</a>
            <a href="feedback.html" class="hover:text-cyan-400">Feedback</a>
            <button @click="logout" class="text-red-400 hover:text-red-300">Logout</button>
        </div>
    </nav>

    <main class="flex-1 p-6 max-w-5xl mx-auto w-full space-y-6">
        <div class="glass p-6 rounded-xl relative">
            <h2 class="text-2xl font-bold mb-4">Active Medicines</h2>
            <div x-show="loading" class="text-slate-400">Loading...</div>
            <div x-show="!loading && medicines.length === 0" class="text-slate-400">No active medicines.</div>
            <div class="space-y-4">
                <template x-for="med in medicines" :key="med.id">
                    <div class="bg-slate-800/50 p-4 rounded border border-slate-700 flex justify-between items-center">
                        <div>
                            <div class="font-bold text-lg" x-text="med.name"></div>
                            <div class="text-sm text-slate-400" x-text="med.dosage_amount + ' ' + med.dosage_unit + ' • ' + med.route"></div>
                            <div x-show="med.frequency_type === 'prn'" class="bg-indigo-900/50 text-indigo-300 text-xs px-2 py-1 rounded inline-block mt-1">PRN — No reminders</div>
                        </div>
                        <button @click="deleteMed(med.id)" class="text-red-400 hover:text-red-300 px-3 py-1 text-sm font-bold disabled:opacity-50" :disabled="actionLoading">Delete</button>
                    </div>
                </template>
            </div>
        </div>

        <div class="glass p-6 rounded-xl relative">
            <h2 class="text-xl font-bold mb-4">Add Medicine</h2>
            <form @submit.prevent="addMed" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-sm mb-1">Name</label><input type="text" x-model="form.name" class="w-full p-2 rounded bg-slate-800 border-slate-700 text-white" required></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-sm mb-1">Amount</label><input type="number" x-model="form.dosage_amount" class="w-full p-2 rounded bg-slate-800 border-slate-700 text-white" required></div>
                    <div>
                        <label class="block text-sm mb-1">Unit</label>
                        <select x-model="form.dosage_unit" class="w-full p-2 rounded bg-slate-800 border-slate-700 text-white" required>
                            <option value="mg">mg</option><option value="ml">ml</option><option value="units">units</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm mb-1">Route</label>
                    <select x-model="form.route" class="w-full p-2 rounded bg-slate-800 border-slate-700 text-white" required>
                        <option value="oral">Oral</option><option value="topical">Topical</option><option value="injection">Injection</option><option value="inhaled">Inhaled</option><option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm mb-1">Frequency</label>
                    <select x-model="form.frequency_type" class="w-full p-2 rounded bg-slate-800 border-slate-700 text-white" required>
                        <option value="daily">Daily</option><option value="weekday">Weekday</option><option value="alternate">Alternate</option><option value="prn">PRN</option>
                    </select>
                </div>
                <div><label class="block text-sm mb-1">Start Date</label><input type="date" x-model="form.start_date" class="w-full p-2 rounded bg-slate-800 border-slate-700 text-white" required></div>
                <div><label class="block text-sm mb-1">End Date (Optional)</label><input type="date" x-model="form.end_date" class="w-full p-2 rounded bg-slate-800 border-slate-700 text-white"></div>
                <div class="md:col-span-2"><label class="block text-sm mb-1">Instructions (Optional)</label><input type="text" x-model="form.instructions" class="w-full p-2 rounded bg-slate-800 border-slate-700 text-white"></div>
                <div class="md:col-span-2 flex justify-end">
                    <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-6 rounded disabled:opacity-50" :disabled="actionLoading">Add</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const config = { SUPABASE_URL: "http://localhost:8000" };
        function medicinesData() {
            return {
                token: sessionStorage.getItem('jwt'),
                medicines: [], loading: true, actionLoading: false,
                form: { name: '', dosage_amount: '', dosage_unit: 'mg', route: 'oral', frequency_type: 'daily', start_date: new Date().toISOString().split('T')[0], end_date: '', instructions: '' },
                async init() {
                    if (!this.token) return window.location.href = 'index.html';
                    const payload = JSON.parse(atob(this.token.split('.')[1]));
                    if (payload.role !== 'patient') {
                        if (payload.role === 'patient') return window.location.href = 'dashboard.html';
                        if (payload.role === 'provider') return window.location.href = 'provider-dashboard.html';
                        if (payload.role === 'admin') return window.location.href = 'admin-dashboard.html';
                        return window.location.href = 'index.html';
                    }
                    await this.fetchMedicines();
                },
                async api(path, method = 'GET', body = null) {
                    const opts = { method, headers: { 'Authorization': `Bearer ${this.token}`, 'Content-Type': 'application/json' } };
                    if (body) opts.body = JSON.stringify(body);
                    const res = await fetch(`${config.SUPABASE_URL}/v1${path}`, opts);
                    if (res.status === 401) { sessionStorage.removeItem('jwt'); window.location.href = 'index.html'; }
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error?.message || "API Error");
                    return data.data;
                },
                async fetchMedicines() {
                    try { this.medicines = await this.api('/medicines/'); } catch(e){} finally { this.loading = false; }
                },
                async addMed() {
                    this.actionLoading = true;
                    try {
                        const payload = { ...this.form };
                        if (!payload.end_date) delete payload.end_date;
                        if (!payload.instructions) delete payload.instructions;
                        await this.api('/medicines/', 'POST', payload);
                        await this.fetchMedicines();
                        this.form.name = ''; this.form.dosage_amount = '';
                    } catch(e){} finally { this.actionLoading = false; }
                },
                async deleteMed(id) {
                    if (!confirm('Are you sure?')) return;
                    this.actionLoading = true;
                    try { await this.api(`/medicines/${id}`, 'DELETE'); await this.fetchMedicines(); } catch(e){} finally { this.actionLoading = false; }
                },
                logout() { sessionStorage.removeItem('jwt'); window.location.href = 'index.html'; }
            }
        }
    </script>
</body>
</html>
