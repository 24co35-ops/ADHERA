<!DOCTYPE html>
<html lang="en">
<head>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicons/logo.svg?v=3">
    <link rel="shortcut icon" href="/assets/favicons/favicon.ico?v=3" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png?v=3">
    <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicons/favicon-48x48.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/favicon-180x180.png?v=3">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#6366f1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhera - Medicines</title>
    <link rel="stylesheet" href="/css/adhera.css">
    <script type="module" src="js/i18n.js"></script>
    <script src="js/nav.js"></script>
    
    <script defer src="/js/alpine-collapse.min.js"></script>
    <script defer src="/js/alpine.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background: #111318; color: #e2e2e8; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px; }
        input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.12) !important; color: #e2e2e8 !important; border-radius: 12px !important; }
        input:focus, select:focus, textarea:focus { outline: none !important; border-color: #00dbe7 !important; }
        select option { background-color: #1a1d24 !important; color: #e2e2e8 !important; }
        [x-cloak] { display: none !important; }
        :focus-visible { outline: 2px solid #00dbe7 !important; outline-offset: 2px !important; border-radius: 6px !important; }
    </style>
</head>
<body x-data="medicinesData()" class="min-h-screen flex flex-col">
    <div id="nav-root"></div>
    <script>
        renderNav('medicines');
    </script>

    <main class="flex-1 px-4 md:px-8 max-w-[1280px] mx-auto w-full space-y-6 pb-12">
        <div class="glass p-6 rounded-xl">
            <h2 class="text-2xl font-bold mb-4" x-text="t('medicines.active_title')"></h2>
            <div x-show="loading" class="space-y-4" x-cloak>
                <div class="animate-pulse bg-white/5 p-4 rounded-xl border border-white/10 flex justify-between items-center h-20">
                    <div class="space-y-2 flex-1">
                        <div class="h-4 bg-slate-700 rounded w-1/3"></div>
                        <div class="h-3 bg-slate-700 rounded w-1/4"></div>
                    </div>
                </div>
            </div>
            <div x-show="!loading && medicines.length === 0" class="text-slate-400 py-8 text-center" x-text="t('medicines.empty')"></div>
            <div x-show="!loading" class="space-y-4">
                <template x-for="med in medicines" :key="med.id">
                    <div class="bg-white/5 rounded-xl border border-white/10 overflow-hidden">
                        <div class="p-4 cursor-pointer hover:bg-white/10 transition-colors flex justify-between items-center" @click="toggleMed(med.id)">
                            <div>
                                <div class="font-bold text-lg text-cyan-50" x-text="med.name"></div>
                                <div class="text-sm text-slate-400 mt-1" x-text="med.dosage_amount + ' ' + med.dosage_unit + ' • ' + med.route + ' • ' + med.frequency_type"></div>
                            </div>
                            <div class="flex items-center gap-3">
                                <button @click.stop="deleteMed(med.id)" class="text-red-400 hover:text-red-300 text-sm" x-text="t('btn.delete')"></button>
                                <svg class="w-5 h-5 text-slate-400 transition-transform duration-200" :class="expandedMed === med.id ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                        <!-- Timings Section -->
                        <div x-show="expandedMed === med.id" x-cloak>
                            <div class="p-4 border-t border-white/10 bg-black/20 space-y-3">
                                <h4 class="font-bold text-sm flex justify-between items-center">
                                    <span x-text="t('timing.title')"></span>
                                    <button @click="showAddTiming(med.id)" class="text-xs bg-cyan-900/50 text-cyan-400 px-3 py-1 rounded-lg border border-cyan-500/30 hover:bg-cyan-900/80" x-text="t('timing.add_btn')"></button>
                                </h4>
                                <div x-show="timingsLoading[med.id]" class="space-y-2" x-cloak>
                                    <div class="animate-pulse bg-white/5 rounded-lg border border-white/5 p-3 h-12 flex items-center">
                                        <div class="h-3 bg-slate-700 rounded w-1/4"></div>
                                    </div>
                                </div>
                                <div x-show="!timingsLoading[med.id] && !(timings[med.id]?.length)" class="text-slate-500 text-sm py-2" x-text="t('timing.empty')"></div>
                                <div x-show="!timingsLoading[med.id]" class="space-y-2">
                                <template x-for="rem in (timings[med.id] || [])" :key="rem.id">
                                    <div class="bg-white/5 rounded-lg border border-white/5 p-3 flex justify-between items-center">
                                        <template x-if="editingReminder !== rem.id">
                                            <div class="flex justify-between items-center w-full">
                                                <div>
                                                    <span class="text-sm font-medium text-cyan-100" x-text="rem.dose_label.charAt(0).toUpperCase() + rem.dose_label.slice(1)"></span>
                                                    <span class="text-xs text-slate-400 ml-2" x-text="rem.dose_time_utc.slice(0, 5)"></span>
                                                </div>
                                                <div class="flex gap-2">
                                                    <button @click="startEditReminder(rem)" class="text-xs text-cyan-400 hover:underline" x-text="t('btn.edit')"></button>
                                                    <button @click="deleteReminder(rem.id)" class="text-xs text-red-400 hover:underline" x-text="t('btn.delete')"></button>
                                                </div>
                                            </div>
                                        </template>
                                        <template x-if="editingReminder === rem.id">
                                            <div class="w-full space-y-2">
                                                <div class="flex flex-wrap gap-3 items-center">
                                                    <input type="time" x-model="editForm.scheduled_time" class="text-sm p-1.5 rounded text-white bg-transparent border border-white/10" required>
                                                    <label class="text-xs text-slate-300 flex items-center gap-1">
                                                        <input type="checkbox" x-model="editForm.advance_notify" class="rounded border-white/10 text-cyan-600 focus:ring-0"> <span x-text="t('timing.advance_short')"></span>
                                                    </label>
                                                    <button @click="saveEditReminder(rem.id)" class="text-xs bg-cyan-600 text-white px-3 py-1.5 rounded-lg" x-text="t('btn.save')"></button>
                                                    <button @click="editingReminder=null" class="text-xs text-slate-400 px-3 py-1.5" x-text="t('btn.cancel')"></button>
                                                </div>
                                                <div x-show="editError" class="text-xs text-red-400" x-text="editError"></div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                </div>
                                <!-- Add Timing Form -->
                                <div x-show="addingTimingFor === med.id" class="bg-white/5 rounded-lg border border-cyan-500/20 p-3 space-y-2" x-cloak>
                                    <div class="grid grid-cols-3 gap-2">
                                        <input type="text" x-model="addTimingForm.dose_label" :placeholder="t('timing.label_placeholder')" class="text-sm p-1.5" maxlength="50">
                                        <input type="time" x-model="addTimingForm.dose_time_utc" class="text-sm p-1.5">
                                        <select x-model="addTimingForm.recurrence_type" class="text-sm p-1.5">
                                            <option value="daily" x-text="t('recurrence.daily')"></option><option value="weekday" x-text="t('recurrence.weekday')"></option><option value="alternate" x-text="t('recurrence.alternate')"></option>
                                        </select>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <label class="text-xs text-slate-300 flex items-center gap-1">
                                            <input type="checkbox" x-model="addTimingForm.advance_notify" class="rounded border-white/10 text-cyan-600 focus:ring-0"> <span x-text="t('timing.advance_notify')"></span>
                                        </label>
                                    </div>
                                    <div class="flex gap-2 justify-end">
                                        <button @click="saveAddTiming(med.id)" class="text-xs bg-cyan-600 text-white px-3 py-1 rounded-lg" x-text="t('btn.add')"></button>
                                        <button @click="addingTimingFor=null" class="text-xs text-slate-400 px-3 py-1" x-text="t('btn.cancel')"></button>
                                    </div>
                                    <div x-show="addTimingError" class="text-xs text-red-400" x-text="addTimingError"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            </div>
        </div>

        <div class="glass p-6 rounded-xl">
            <h2 class="text-xl font-bold mb-4" x-text="t('medicines.add_title')"></h2>
            <form @submit.prevent="addMed" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-sm mb-1" x-text="t('form.name')"></label><input type="text" x-model="form.name" class="w-full p-2 rounded" required></div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-sm mb-1" x-text="t('form.amount')"></label><input type="number" x-model="form.dosage_amount" class="w-full p-2 rounded" required></div>
                    <div><label class="block text-sm mb-1" x-text="t('form.unit')"></label><select x-model="form.dosage_unit" class="w-full p-2 rounded" required><option value="mg" x-text="t('unit.mg')"></option><option value="ml" x-text="t('unit.ml')"></option><option value="units" x-text="t('unit.units')"></option></select></div>
                </div>
                <div><label class="block text-sm mb-1" x-text="t('form.route')"></label><select x-model="form.route" class="w-full p-2 rounded" required><option value="oral" x-text="t('route.oral')"></option><option value="topical" x-text="t('route.topical')"></option><option value="injection" x-text="t('route.injection')"></option><option value="inhaled" x-text="t('route.inhaled')"></option><option value="other" x-text="t('route.other')"></option></select></div>
                <div><label class="block text-sm mb-1" x-text="t('form.frequency')"></label><select x-model="form.frequency_type" class="w-full p-2 rounded" required><option value="daily" x-text="t('recurrence.daily')"></option><option value="weekday" x-text="t('recurrence.weekday')"></option><option value="alternate" x-text="t('recurrence.alternate')"></option><option value="prn" x-text="t('recurrence.prn')"></option></select></div>
                <div><label class="block text-sm mb-1" x-text="t('form.start_date')"></label><input type="date" x-model="form.start_date" class="w-full p-2 rounded" required></div>
                <div><label class="block text-sm mb-1" x-text="t('form.end_date')"></label><input type="date" x-model="form.end_date" class="w-full p-2 rounded"></div>
                <div><label class="block text-sm mb-1" x-text="t('form.timing')"></label><select x-model="form.timing" class="w-full p-2 rounded"><option value="" x-text="t('timing.none')"></option><option value="Morning" x-text="t('timing.morning')"></option><option value="Afternoon" x-text="t('timing.afternoon')"></option><option value="Evening" x-text="t('timing.evening')"></option><option value="Night" x-text="t('timing.night')"></option></select></div>
                <div><label class="block text-sm mb-1" x-text="t('form.scheduled_time')"></label><input type="time" x-model="form.scheduled_time" class="w-full p-2 rounded"></div>
                <div class="md:col-span-2"><label class="block text-sm mb-1" x-text="t('form.instructions')"></label><input type="text" x-model="form.instructions" class="w-full p-2 rounded"></div>
                <div class="md:col-span-2 flex justify-end"><button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-6 rounded-lg disabled:opacity-50" :disabled="actionLoading" x-text="t('form.add_submit')"></button></div>
                <div x-show="addError" class="md:col-span-2 text-sm text-red-400 bg-red-400/10 border border-red-400/30 rounded-lg px-4 py-2" x-text="addError" x-cloak></div>
            </form>
        </div>
    </main>

    <script>
        const _token = sessionStorage.getItem('adhera_token');
        if (!_token) { window.location.href = 'index.html'; throw new Error('No token'); }
        const _payload = JSON.parse(atob(_token.split('.')[1]));
        const _role = _payload.app_metadata?.role || _payload.user_metadata?.role || _payload.role;
        if (_role !== 'patient') window.location.href = 'index.html';

        const config = { SUPABASE_URL: CONFIG.API_BASE.replace("/v1", "") };
        function medicinesData() {
            return {
                token: sessionStorage.getItem('adhera_token'),
                medicines: [], loading: true, actionLoading: false,
                expandedMed: null, timings: {}, timingsLoading: {},
                editingReminder: null, editForm: {}, editError: '',
                addingTimingFor: null, addTimingForm: { dose_label: '', dose_time_utc: '', recurrence_type: 'daily', timezone: 'UTC', advance_notify: false }, addTimingError: '',
                addError: '',
                form: { name: '', dosage_amount: '', dosage_unit: 'mg', route: 'oral', frequency_type: 'daily', start_date: new Date().toISOString().split('T')[0], end_date: '', instructions: '', timing: '', scheduled_time: '', advance_notify: false },
                async init() {
                    await this.fetchMedicines();
                },
                async api(path, method = 'GET', body = null) {
                    const opts = { method, headers: { 'Authorization': `Bearer ${this.token}`, 'Content-Type': 'application/json' } };
                    if (body) opts.body = JSON.stringify(body);
                    const res = await adheraFetch(path, opts);
                    const data = await res.json();
                    if (!data.success) throw new Error(data.error?.message || "API Error");
                    return data.data;
                },
                async fetchMedicines() { try { this.medicines = await this.api('/medicines/'); } catch(e){} finally { this.loading = false; } },
                async toggleMed(id) {
                    if (this.expandedMed === id) { this.expandedMed = null; return; }
                    this.expandedMed = id;
                    await this.fetchTimings(id);
                },
                async fetchTimings(medId) {
                    this.timingsLoading[medId] = true;
                    try { this.timings[medId] = await this.api(`/medicines/${medId}/reminders`); } catch(e) { this.timings[medId] = []; }
                    finally { this.timingsLoading[medId] = false; }
                },
                showAddTiming(medId) { this.addingTimingFor = medId; this.addTimingForm = { dose_label: '', dose_time_utc: '', recurrence_type: 'daily', timezone: 'UTC', advance_notify: false }; this.addTimingError = ''; },
                async saveAddTiming(medId) {
                    if (!this.addTimingForm.dose_label || !this.addTimingForm.dose_time_utc) { this.addTimingError = 'Label and time required.'; return; }
                    try {
                        await this.api(`/medicines/${medId}/reminders`, 'POST', this.addTimingForm);
                        this.addingTimingFor = null;
                        await this.fetchTimings(medId);
                    } catch(e) {
                        this.addTimingError = e.message.includes('slot') ? 'This time slot already exists for this medicine.' : e.message;
                    }
                },
                startEditReminder(rem) { this.editingReminder = rem.id; this.editForm = { scheduled_time: rem.dose_time_utc.slice(0, 5), advance_notify: !!rem.advance_notify }; this.editError = ''; },
                async saveEditReminder(remId) {
                    try {
                        const body = { scheduled_time: this.editForm.scheduled_time, advance_notify: this.editForm.advance_notify };
                        await this.api(`/reminders/${remId}`, 'PATCH', body);
                        this.editingReminder = null;
                        await this.fetchTimings(this.expandedMed);
                    } catch(e) { this.editError = e.message; }
                },
                async deleteReminder(remId) {
                    if (!confirm('Delete this timing?')) return;
                    try {
                        await this.api(`/reminders/${remId}`, 'DELETE');
                        await this.fetchTimings(this.expandedMed);
                    } catch(e) { console.error(e); }
                },
                async addMed() {
                    this.addError = '';
                    // Client-side guards
                    const dosage = parseFloat(this.form.dosage_amount);
                    if (!this.form.name || !this.form.name.trim()) { this.addError = 'Medicine name is required.'; return; }
                    if (isNaN(dosage) || dosage <= 0) { this.addError = 'Dosage must be a positive number.'; return; }
                    if (!this.form.start_date) { this.addError = 'Start date is required.'; return; }
                    this.actionLoading = true;
                    try {
                        const body = {
                            name: this.form.name,
                            dosage: dosage,
                            unit: this.form.dosage_unit,
                            route: this.form.route,
                            frequency_type: this.form.frequency_type,
                            start_date: this.form.start_date
                        };
                        if (this.form.instructions) body.instructions = this.form.instructions;
                        if (this.form.end_date) body.end_date = this.form.end_date;

                        console.log("Sending medicine payload:", JSON.stringify(body));
                        const newMedicine = await this.api('/medicines/', 'POST', body);
                        
                        if (this.form.timing && this.form.scheduled_time) {
                            try {
                                await this.api(`/medicines/${newMedicine.id}/reminders`, 'POST', {
                                    dose_label: this.form.timing,
                                    scheduled_time: this.form.scheduled_time,
                                    frequency_type: this.form.frequency_type || 'daily',
                                    advance_notify: this.form.advance_notify
                                });
                            } catch(re) {
                                // Medicine was saved but reminder failed — show specific message
                                const msg = re.message || '';
                                this.addError = msg.toLowerCase().includes('slot') || msg.toLowerCase().includes('duplicate')
                                    ? 'Medicine added, but that time slot already exists for this medicine.'
                                    : 'Medicine added, but failed to add reminder: ' + msg;
                                console.error('Error adding reminder:', re);
                            }
                        }
                        
                        await this.fetchMedicines();
                        if (!this.addError) {
                            this.form.name = ''; this.form.dosage_amount = '';
                            this.form.timing = ''; this.form.scheduled_time = '';
                        }
                    } catch(e) {
                        console.error('Error adding medicine/reminder:', e);
                        const msg = e.message || '';
                        if (msg.toLowerCase().includes('session') || msg.toLowerCase().includes('token') || msg.toLowerCase().includes('unauthorized')) {
                            sessionStorage.removeItem('adhera_token');
                            window.location.href = 'index.html';
                            return;
                        }
                        if (msg.toLowerCase().includes('slot') || msg.toLowerCase().includes('duplicate') || msg.toLowerCase().includes('conflict')) {
                            this.addError = 'This time slot already exists for this medicine.';
                        } else if (msg.toLowerCase().includes('validation') || msg.toLowerCase().includes('invalid')) {
                            this.addError = msg;
                        } else {
                            this.addError = msg || 'Failed to add medicine. Please try again.';
                        }
                    } finally { this.actionLoading = false; }
                },
                async deleteMed(id) {
                    if (!confirm('Are you sure?')) return;
                    this.actionLoading = true;
                    try { await this.api(`/medicines/${id}`, 'DELETE'); await this.fetchMedicines(); } catch(e){} finally { this.actionLoading = false; }
                },
                logout() { sessionStorage.removeItem('adhera_token'); window.location.href = 'index.html'; }
            }
        }
    </script>
</body>
</html>
